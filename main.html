<!DOCTYPE html>
<html>
<head>
    <title>Extra Browser</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }
        #bar {
            background: #222;
            padding: 10px;
        }
        input {
            width: 80%;
            padding: 8px;
            font-size: 16px;
        }
        button {
            padding: 8px;
            font-size: 16px;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
        }
    </style>
</head>
<body>

<div id="bar">
    <input type="text" id="url" placeholder="Enter URL (example.com)">
    <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
function go() {
    let url = document.getElementById("url").value;

    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    document.getElementById("frame").src = url;
}
</script>

</body>
</html>
